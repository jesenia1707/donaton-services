services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  donaton-services:
    image: donaton-services:latest
    container_name: donaton-services
    ports:
      - "8082:8082"
    depends_on:
      - rabbitmq

  logistica:
    image: logistica-service:latest
    depends_on:
      - rabbitmq

  usuarios:
    image: usuarios-service:latest
    container_name: usuarios
    ports:
      - "8081:8081"

  frontend:
    image: donaton-front:latest
    container_name: frontend
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    container_name: nginx-balancer
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - logistica