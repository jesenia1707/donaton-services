spring.application.name=donaton-services


spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

server.port=8082

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
# Configuración de la Base de Datos (Puerto corregido a 5432)
spring.datasource.url=jdbc:postgresql://localhost:5432/donaton
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Estrategia de nombres (Para que coincida con pgAdmin)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Configuración JPA/Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Evitar el error de Open Session in View
spring.jpa.open-in-view=false
